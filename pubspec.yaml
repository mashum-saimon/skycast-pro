name: skycast_pro
description: "SkyCast Pro - A premium enterprise weather application built with Flutter Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local Storage
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Routing
  go_router: ^14.2.0

  # UI / UX
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10+1

  # Utilities
  equatable: ^2.0.5
  intl: ^0.19.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  dartz: ^0.10.1
  logger: ^2.3.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/

  # Custom fonts are loaded via google_fonts package at runtime,
  # so no bundled font files are required here.
